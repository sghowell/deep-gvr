name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync

      - name: Repository checks
        run: uv run python scripts/check_repo.py

      - name: Capability probes
        run: uv run python scripts/run_capability_probes.py

      - name: Release surface preflight
        run: |
          export HOME=/tmp/deep-gvr-release-home
          bash scripts/install.sh --target "$HOME/.hermes/skills"
          uv run python scripts/release_preflight.py \
            --json \
            --skills-dir "$HOME/.hermes/skills" \
            --config "$HOME/.hermes/deep-gvr/config.yaml" \
            --hermes-config "$HOME/.hermes/config.yaml" \
            > /tmp/deep-gvr-release-preflight.json

      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v

      - name: Benchmark smoke
        run: uv run python eval/run_eval.py --routing-probe fallback --output /tmp/deep-gvr-eval-results.json
