site_name: deep-gvr
site_description: Verification-oriented research system for Hermes Agent, Codex local, Codex automation and subagent workflows, and direct CLI use.
site_url: https://sghowell.github.io/deep-gvr/
repo_url: https://github.com/sghowell/deep-gvr
repo_name: sghowell/deep-gvr
docs_dir: docs
exclude_docs: |
  README.md
  architecture-status.md
  capability-probes.md
  contracts-and-artifacts.md
  golden-principles.md
theme:
  name: material
  logo: assets/deep-gvr-mark.svg
  favicon: assets/deep-gvr-mark.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Start Here: start-here.md
  - Codex Local: codex-local.md
  - Codex Plugin:
      - Overview: codex-plugin.md
      - Privacy: plugin-privacy.md
      - Terms: plugin-terms.md
  - Codex Automations: codex-automations.md
  - Codex Review and Visual QA: codex-review-qa.md
  - Codex Subagents: codex-subagents.md
  - Codex SSH Devbox: codex-ssh-devbox.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Domain Portfolio: domain-portfolio.md
  - Examples: examples.md
  - FAQ: faq.md
  - Technical Reference:
      - System Overview: system-overview.md
      - Backend Parity Matrix: backend-parity-matrix.md
      - Tier 2 and Tier 3 Support Matrix: tier2-tier3-support-matrix.md
      - Architecture and Design: deep-gvr-architecture.md
      - Release Workflow: release-workflow.md
