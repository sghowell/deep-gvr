name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync --all-extras

      - name: Repository checks
        run: uv run python scripts/check_repo.py

      - name: Capability probes
        run: uv run python scripts/run_capability_probes.py

      - name: Release surface preflight
        run: |
          export HERMES_HOME=/tmp/deep-gvr-release-home/.hermes
          bash scripts/install.sh --target "$HERMES_HOME/skills"
          uv run python scripts/release_preflight.py \
            --json \
            --skills-dir "$HERMES_HOME/skills" \
            --config "$HERMES_HOME/deep-gvr/config.yaml" \
            --hermes-config "$HERMES_HOME/config.yaml" \
            > /tmp/deep-gvr-release-preflight.json

      - name: Clean-room install smoke
        run: uv run python scripts/clean_room_install_smoke.py --json

      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v

      - name: Tier 2 support eval
        run: uv run python eval/run_eval.py --subset tier2-support --output /tmp/deep-gvr-tier2-support.json

      - name: Tier 3 support eval
        run: uv run python eval/run_eval.py --subset tier3-support --output /tmp/deep-gvr-tier3-support.json

      - name: Docs build
        run: uv run mkdocs build --strict

      - name: Benchmark smoke
        run: uv run python eval/run_eval.py --routing-probe fallback --output /tmp/deep-gvr-eval-results.json
