loop:
  max_iterations: 3
  alternative_approach: true
  max_alternatives: 2
verification:
  tier1:
    enabled: true
  tier2:
    enabled: true
    default_adapter_family: qec_decoder_benchmark
    default_backend: local
    timeout_seconds: 3600
    modal:
      cli_bin: modal
      stub_path: adapters/modal_stubs/stim_modal.py
    ssh:
      host: ""
      user: ""
      key_path: ""
      remote_workspace: ""
      python_bin: python3
  tier3:
    enabled: false
    backend: aristotle
    timeout_seconds: 300
    mathcode:
      root: ~/dev/mathcode
      run_script: ~/dev/mathcode/run
models:
  orchestrator:
    provider: default
    model: ""
  generator:
    provider: openrouter
    model: ""
  verifier:
    provider: openrouter
    model: ""
  reviser:
    provider: default
    model: ""
runtime:
  orchestrator_backend: hermes
evidence:
  directory: ~/.hermes/deep-gvr/sessions
  persist_to_memory: true
domain:
  default: qec
  context_file: ""
